---
- name: Deploy Flask app
  hosts: ubuntu
  become: yes

  vars:
    repo_url: https://github.com/LeonZen-5/devops-projects.git
    project_dir: /home/devcristian/devops-projects

  tasks:
    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - git
          - docker.io
          - python3-docker
        state: present
        update_cache: yes

    - name: Ensure docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes

    - name: Build Docker image
      community.docker.docker_image:
        name: devops-projects
        build:
          path: "{{ project_dir }}"
        source: build
        state: present
        force_source: yes

    - name: Run container
      community.docker.docker_container:
        name: devops-projects
        image: devops-projects
        state: started
        restart_policy: unless-stopped
        ports:
          - "5000:5000"

    - name: Show running containers
      ansible.builtin.command: docker ps
      register: docker_ps
      changed_when: false

    - name: Print docker ps output
      ansible.builtin.debug:
        var: docker_ps.stdout_lines
