---
- name: Deploy Flask app
  hosts: ubuntu
  become: yes

  vars:
    repo_url: https://github.com/LeonZen-5/devops-projects.git
    project_dir: /home/devcristian/devops-projects

  tasks:
    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - git
          - docker.io
          - python3-docker
        state: present
        update_cache: yes

    - name: Ensure docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes
